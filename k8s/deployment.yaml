apiVersion: apps/v1
kind: Deployment

metadata:
  name: incident-ai

spec:
  replicas: 2

  selector:
    matchLabels:
      app: incident-ai

  template:
    metadata:
      labels:
        app: incident-ai

    spec:
      containers:
      - name: incident-ai

        image: incident-ai:latest

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8000

        env:
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-secret
              key: GOOGLE_API_KEY